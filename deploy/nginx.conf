# Boostify talk deck - nginx site config
# Installed to /etc/nginx/sites-available/boostify-talk-deck by deploy/setup.sh
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/boostify-talk-deck;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # vendored reveal.js assets are versioned; cache them hard
    location /vendor/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # never cache the deck itself, so updates show on refresh
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
