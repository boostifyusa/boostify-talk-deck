# presentation.boostifyusa.com — name-based vhost for the talk deck.
# It only answers for this hostname, so it coexists with anything else on the
# droplet and does NOT become the default server.
server {
    listen 80;
    listen [::]:80;
    server_name presentation.boostifyusa.com;

    root /var/www/presentation;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # vendored reveal.js + images are versioned; cache hard
    location ~* \.(js|css|svg|jpg|jpeg|png|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # always re-check the deck itself so updates show on refresh
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
